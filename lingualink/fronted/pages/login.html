<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LinguaLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-sky-100">
  <div class="min-h-screen grid lg:grid-cols-2">
    <section class="hidden lg:flex items-center justify-center p-12">
      <div class="max-w-lg">
        <a href="/fronted/pages/pagina-principal.html" class="nav-link">← Back to top</a>
        <div class="card p-10 mt-10 floating">
          <img src="../img/imagen-login.png" alt="LinguaLink" class="max-w-[800px] w-full h-auto">
    </div>
      </div>
    </section>

    <section class="flex items-center justify-center p-6">
      <div class="card p-8 md:p-10 w-full max-w-md">
        <div class="brand text-3xl text-blue-700 mb-8">Lingua<span class="text-red-500">Link</span></div>
        <h2 class="text-3xl font-extrabold">Login</h2>
        <p class="text-slate-500 mt-2">Teacher or student</p>

        <div id="login-alert" class="hidden mt-5 p-4 rounded-2xl bg-red-50 text-red-600 font-semibold"></div>

        <form class="mt-8 space-y-5" onsubmit="event.preventDefault(); login();">
          <div>
            <label class="font-semibold text-sm">Document type</label>
            <select id="type_document" class="input mt-2" required>
              <option value="">Select</option>
              <option value="CC">CC</option>
              <option value="TI">TI</option>
            </select>
          </div>
          <div>
            <label class="font-semibold text-sm">Document number</label>
            <input id="number_document" class="input mt-2" placeholder="Ej: 22344556" required>
          </div>
          <div>
  <label class="font-semibold text-sm">Password</label>

  <div class="relative mt-2">
    <input 
      id="password" 
      type="password" 
      class="input w-full pr-12" 
      placeholder="Contraseña" 
      required
    >

    <button 
      type="button"
      onclick="togglePassword()"
      class="absolute right-4 top-1/2 -translate-y-1/2 text-xl text-slate-500 hover:text-blue-600"
    >
      <span id="eye-icon">👁️</span>
    </button>
  </div>
</div>
          <button class="btn-primary w-full py-4 rounded-2xl font-bold" type="submit">Get in</button>
        </form>
      </div>
    </section>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
