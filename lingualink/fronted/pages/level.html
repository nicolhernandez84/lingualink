<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabularies</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-gradient-to-br from-blue-50 via-white to-sky-100">

  <nav class="glass sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

      <div class="brand text-3xl text-blue-700">
        Lingua<span class="text-red-500">Link</span>
      </div>

      <div class="flex gap-5 items-center">
        <a class="nav-link" href="/fronted/pages/select-nivel.html">
          Change level
        </a>

        <button onclick="logout()" class="font-bold text-red-500">
          Exit
        </button>
      </div>

    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-12">

    <!-- ENCABEZADO DEL NIVEL -->
    <section class="student-level-header">
      <h1 id="level-title" class="student-level-title"></h1>
      <p id="level-description" class="student-level-description"></p>
    </section>

    <!-- BOTONES PRINCIPALES -->
    <section class="student-menu-grid">

      <button
        id="student-btn-vocabularies"
        onclick="showLevelSection('vocabularies')"
        class="student-menu-card student-menu-blue border-2 border-transparent"
      >
        <div class="student-menu-icon">
          📚
        </div>

        <h2 class="text-2xl font-extrabold text-slate-900">
          View vocabulary
        </h2>

        <p class="text-slate-500 mt-2">
          Consult the available vocabularies for this level.
        </p>
      </button>

      <button
        id="student-btn-activities"
        onclick="showLevelSection('activities')"
        class="student-menu-card student-menu-green border-2 border-transparent"
      >
        <div class="student-menu-icon">
          🧩
        </div>

        <h2 class="text-2xl font-extrabold text-slate-900">
          Perform activities
        </h2>

        <p class="text-slate-500 mt-2">
          practice with activities to complete and activities to relate.
        </p>
      </button>

      <button
        id="student-btn-progress"
        onclick="showLevelSection('progress')"
        class="student-menu-card student-menu-purple border-2 border-transparent"
      >
        <div class="student-menu-icon">
          📈
        </div>

        <h2 class="text-2xl font-extrabold text-slate-900">
          View progress
        </h2>

        <p class="text-slate-500 mt-2">
          Review your general progress in the activities performed.
        </p>
      </button>

    </section>

    <!-- SECCIÓN VOCABULARIOS -->
    <section id="student-vocab-section">
      <section class="student-section-header">
        <h2>
          Available vocabularies
        </h2>

        <p>
          Select a vocabulary to study its words.
        </p>
      </section>

      <section
        id="vocab-grid"
        class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></section>
    </section>

    <!-- SECCIÓN ACTIVIDADES -->
    <section id="student-activities-section" class="hidden">
      <section class="student-section-header">
        <h2>
          Available activities
        </h2>

        <p>
          Complete the activities posted by your teacher.
        </p>
      </section>

      <section
        id="student-activities-grid"
        class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></section>
    </section>

    <!-- SECCIÓN PROGRESO -->
    <section id="student-progress-section" class="hidden">
      <section class="student-section-header">
        <h2>
          General progress
        </h2>

        <p>
          Here you can see your progress at the selected level.
        </p>
      </section>

      <section id="student-progress-grid" class="grid gap-6"></section>
    </section>

  </main>

  <script src="../js/app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initStudentLevelDashboard();
    });
  </script>

</body>

</html>
