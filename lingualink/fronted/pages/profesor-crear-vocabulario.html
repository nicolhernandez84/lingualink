<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create vocabulary</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-gradient-to-br from-blue-50 via-white to-sky-100">

  <main class="max-w-7xl mx-auto px-6 py-12">

    <!-- NAV SUPERIOR -->
    <div class="flex justify-between items-center mb-10">
      <a href="/fronted/pages/profesor.html" class="brand text-3xl text-blue-700">
        Lingua<span class="text-red-500">Link</span>
      </a>

      <div class="flex gap-5 items-center">
        <a href="/fronted/pages/profesor.html" class="nav-link">
          Panel
        </a>

        <button onclick="logout()" class="font-bold text-red-500">
          Log out
        </button>
      </div>
    </div>

    <!-- ENCABEZADO DECORADO -->
    <section class="form-hero theme-vocabulary no-decor-circles p-10 mb-10">
      <div class="form-hero-content flex flex-col md:flex-row md:items-center gap-8">

        <div class="form-hero-icon">
          📚
        </div>

        <div>
          <span class="form-label-pill">
            Vocabulary management
          </span>

          <h1 class="text-4xl md:text-5xl font-extrabold mt-4 text-slate-900">
            Create vocabulary
          </h1>

          <div class="form-decoration-line"></div>

          <p class="text-slate-500 mt-5 max-w-3xl">
            Record new vocabulary so that students can visualize it and perform activities.
          </p>
        </div>

      </div>
    </section>

    <!-- FORMULARIO -->
    <section class="form-panel p-10">

      <div class="mb-8">
        <h2 class="form-section-title">
          Vocabulary information
        </h2>

        <p class="form-section-description">
          Complete the main information and add the words using the English|Spanish format.
        </p>
      </div>

      <div class="form-grid two-columns">

        <div class="form-field">
          <label for="name">Vocabulary name</label>
          <input
            id="name"
            class="input"
            placeholder="Example: Food"
          >
        </div>

        <div class="form-field">
          <label for="level">Level</label>
          <input
            id="level"
            class="input"
            placeholder="Example: A1, A2, B1"
          >
        </div>

        <div class="form-field">
          <label for="theme">Theme</label>
          <input
            id="theme"
            class="input"
            placeholder="Example: Learn vocabulary related to food"
          >
        </div>

        <div class="form-field">
          <label for="emoji">Emoji</label>
          <input
            id="emoji"
            class="input"
            placeholder="Example: 🍎"
          >
        </div>

        <div class="form-field full">
  <label for="color">Color de la tarjeta</label>

  <select id="color" class="input">
    <option value="from-blue-500 to-blue-700">🔵 Azul</option>
    <option value="from-sky-500 to-cyan-600">💧 Celeste</option>
    <option value="from-green-500 to-green-700">🟢 Verde</option>
    <option value="from-emerald-500 to-teal-700">🍃 Esmeralda</option>
    <option value="from-purple-500 to-purple-700">🟣 Morado</option>
    <option value="from-indigo-500 to-purple-700">💜 Índigo</option>
    <option value="from-pink-500 to-pink-700">🌸 Rosado</option>
    <option value="from-orange-500 to-orange-600">🟠 Naranja</option>
    <option value="from-red-500 to-red-700">🔴 Rojo</option>
    <option value="from-yellow-400 to-yellow-600">🟡 Amarillo</option>
  </select>
</div>

        <div class="form-field full">
  <label>Vocabulary words</label>

  <div id="words-container" class="space-y-4">
    <div class="word-row grid md:grid-cols-3 gap-4">
      <input class="input word-english" placeholder="English word">
      <input class="input word-spanish" placeholder="Spanish word">
      <label class="inline-flex flex-col items-center justify-center px-5 py-3 rounded-2xl bg-blue-600 text-white font-bold cursor-pointer hover:bg-blue-700 transition w-fit min-w-[180px]">

  <span class="text-white">
    Seleccionar MP3
  </span>

  <span class="file-name text-xs mt-1 text-blue-100 font-medium max-w-[160px] truncate">
    No file selected
  </span>

  <input
    class="hidden word-audio"
    type="file"
    accept=".mp3,audio/mpeg"
    onchange="this.parentElement.querySelector('.file-name').textContent = this.files[0] ? this.files[0].name : 'No file selected'"
  >
</label>
    </div>
  </div>

  <button
    type="button"
    onclick="addWordRow()"
    class="mt-4 px-5 py-3 rounded-2xl bg-slate-100 font-bold"
  >
    + Add word
  </button>
</div>

</div>
</div>
      </div>

      

      <div class="form-actions">
        <button
          onclick="createTeacherVocabulary()"
          class="btn-blue px-6 py-4 rounded-2xl font-bold"
        >
          Save vocabulary
        </button>

        <a
          href="/fronted/pages/profesor.html"
          class="px-6 py-4 rounded-2xl bg-slate-100 font-bold text-slate-700"
        >
          Cancel
        </a>
      </div>

      <div id="teacher-alert" class="hidden"></div>

    </section>

  </main>

  <script src="../js/app.js"></script>

  <script>
  protect('teacher');
</script>

</body>

</html>
